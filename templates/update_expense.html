{% extends 'base.html' %}

{% block title %}
Update Expense
{% endblock %}

{% block content %}

<div class="container-fluid px-3">

    <!-- PAGE HEADER -->
    <div class="mb-3">
        <h3 class="fw-bold">Update Expense</h3>
        <small class="text-muted">Edit and update your transaction details</small>
    </div>

    <!-- FORM CARD -->
    <div class="card shadow-sm border-0" style="border-radius:12px; max-width:600px;">

        <div class="card-body p-4">

            <form method="POST">
                {% csrf_token %}

                <!-- Render fields manually for better UI control -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Title</label>
                    {{ form.title }}
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Amount</label>
                    {{ form.amount }}
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Category</label>
                    {{ form.category }}
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Date</label>
                    {{ form.expense_date }}
                </div>

                <!-- BUTTONS -->
                <div class="d-flex gap-2 mt-4">

                    <button type="submit" class="btn btn-success w-100">
                        Update Expense
                    </button>

                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary w-100">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
