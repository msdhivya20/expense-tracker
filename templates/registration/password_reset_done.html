{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Password Reset Sent
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<style>

body{
background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#334155
);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:
'Segoe UI',
sans-serif;
}

.reset-card{

width:500px;

background:
rgba(
255,
255,
255,
0.95
);

backdrop-filter:
blur(12px);

padding:45px;

border-radius:30px;

box-shadow:
0 20px 60px
rgba(
0,
0,
0,
0.25
);

text-align:center;

animation:
fade .7s;
}

@keyframes fade{

from{
opacity:0;
transform:
translateY(
25px
);
}

to{
opacity:1;
transform:
translateY(
0
);
}

}

.icon{

width:90px;

height:90px;

background:
linear-gradient(
135deg,
#22c55e,
#16a34a
);

color:white;

font-size:40px;

display:flex;

align-items:center;

justify-content:center;

border-radius:50%;

margin:auto;

margin-bottom:25px;

box-shadow:
0 15px 30px
rgba(
34,
197,
94,
0.4
);
}

.title{

font-size:30px;

font-weight:700;

color:#0f172a;

margin-bottom:12px;
}

.desc{

color:#64748b;

line-height:1.8;

margin-bottom:35px;
}

.btn-login{

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

border:none;

padding:14px;

border-radius:15px;

font-weight:600;

width:100%;

color:white;

transition:.3s;
}

.btn-login:hover{

transform:
translateY(-2px);

box-shadow:
0 12px 25px
rgba(
37,
99,
235,
0.3
);

color:white;

}

.small-text{

margin-top:20px;

color:#94a3b8;

font-size:14px;

}

</style>

</head>

<body>

<div class="reset-card">

<div class="icon">
✓
</div>

<div class="title">

Check Your Email

</div>

<div class="desc">

We sent a password reset link to your email address.

Open your inbox and follow the instructions to create a new password.

</div>

<a
href="{% url 'login' %}"
class="btn btn-login"
>

Back To Login

</a>

<div class="small-text">

Didn't receive the email?
Check spam folder.

</div>

</div>

</body>

</html>
