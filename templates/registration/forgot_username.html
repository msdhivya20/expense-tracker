<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Forgot Username | Expense Tracker Pro</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Inter,sans-serif;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#111827
);

padding:20px;

}

/* CARD */

.card-box{

width:430px;

padding:36px;

border-radius:24px;

background:
rgba(
255,
255,
255,
0.08
);

backdrop-filter:
blur(18px);

border:
1px solid rgba(
255,
255,
255,
0.15
);

color:white;

box-shadow:
0 30px 80px
rgba(
0,
0,
0,
0.45
);

}

/* TITLE */

h3{

font-weight:800;

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

font-size:14px;

color:#cbd5e1;

margin-bottom:30px;

}

/* INPUT */

.form-control{

height:52px;

background:
rgba(
255,
255,
255,
0.08
);

border:
1px solid rgba(
255,
255,
255,
0.18
);

color:white !important;

border-radius:14px;

}

.form-control::placeholder{

color:#cbd5e1;

}

.form-control:focus{

background:
rgba(
255,
255,
255,
0.12
);

border-color:#3b82f6;

box-shadow:
0 0 0 4px
rgba(
59,
130,
246,
0.2
);

}

/* BUTTON */

.btn-primary{

height:52px;

background:#2563eb;

border:none;

font-weight:700;

border-radius:14px;

transition:.3s;

}

.btn-primary:hover{

background:#1d4ed8;

transform:
translateY(-2px);

}

/* MESSAGE */

.alert{

border:none;

border-radius:14px;

font-size:13px;

font-weight:600;

margin-top:18px;

}

.alert-success{

background:#15803d;

color:white;

}

.alert-error{

background:#dc2626;

color:white;

}

.alert-info{

background:#2563eb;

color:white;

}

/* FOOTER */

.bottom{

margin-top:22px;

text-align:center;

}

.bottom a{

text-decoration:none;

color:#93c5fd;

font-weight:600;

}

.bottom a:hover{

color:white;

}

/* ICON */

.icon{

font-size:42px;

text-align:center;

margin-bottom:12px;

}

/* MOBILE */

@media(max-width:600px){

.card-box{

width:100%;

padding:28px;

}

}

</style>

</head>

<body>

<div class="card-box">

<div class="icon">

📧

</div>

<h3>

Forgot Username

</h3>

<p class="subtitle">

Enter your registered email to retrieve your username.

</p>

<form method="POST">

{% csrf_token %}

<input

type="email"

name="email"

class="form-control mb-3"

placeholder="Enter your email"

required

>

<button class="btn btn-primary w-100">

Find Username

</button>

</form>


{% if messages %}

<div id="msgBox">

{% for message in messages %}

<div class="alert alert-{{ message.tags }}">

{{ message }}

</div>

{% endfor %}

</div>

{% endif %}


<div class="bottom">

<a href="{% url 'login' %}">

← Back to Login

</a>

</div>

</div>


<script>

setTimeout(()=>{

const msg=document.getElementById("msgBox");

if(msg){

msg.style.opacity="0";

setTimeout(()=>msg.remove(),500);

}

},4000);

</script>

</body>

</html>
