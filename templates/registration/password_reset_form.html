{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Forgot Password
</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<style>

body{

margin:0;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#334155
);

font-family:
Segoe UI,
sans-serif;

}

.forgot-card{

width:460px;

background:
rgba(
255,
255,
255,
0.96
);

padding:45px;

border-radius:28px;

box-shadow:
0 20px 60px
rgba(
0,
0,
0,
0.25
);

animation:
show .6s;

}

@keyframes show{

from{
opacity:0;
transform:
translateY(30px);
}

to{
opacity:1;
transform:
translateY(0);
}

}

.icon{

width:90px;

height:90px;

margin:auto;

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:40px;

color:white;

margin-bottom:25px;

}

.title{

text-align:center;

font-size:30px;

font-weight:700;

margin-bottom:10px;

color:#0f172a;

}

.subtitle{

text-align:center;

color:#64748b;

margin-bottom:30px;

line-height:1.7;

}

input{

width:100%;

padding:14px;

border-radius:14px;

border:1px solid #dbe2ea;

outline:none;

}

input:focus{

border-color:#2563eb;

box-shadow:
0 0 0 4px
rgba(
37,
99,
235,
0.15
);

}

.btn-send{

width:100%;

padding:14px;

border:none;

border-radius:14px;

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

color:white;

font-weight:600;

margin-top:20px;

transition:.3s;

}

.btn-send:hover{

transform:
translateY(-2px);

}

.bottom{

text-align:center;

margin-top:22px;

}

.bottom a{

text-decoration:none;

font-weight:600;

}

</style>

</head>

<body>

<div class="forgot-card">

<div class="icon">

🔒

</div>

<div class="title">

Forgot Password

</div>

<div class="subtitle">

Enter your registered email address and we'll send a secure password reset link.

</div>

<form method="POST">

{% csrf_token %}

{{ form.email }}

<button class="btn-send">

Send Reset Link

</button>

</form>

<div class="bottom">

Remember password?

<a href="{% url 'login' %}">

Back to Login

</a>

</div>

</div>

</body>

</html>
